#VRML_SIM R2025a utf8

PROTO RobotstadiumGoal [
  field SFVec3f    translation 0 0 0
  field SFRotation rotation    0 0 1 0
  field SFString   name        "drone navigation gate"
  field SFFloat    postRadius  0.05
  field SFColor    frameColor  1 1 1
]
{
Solid {
  translation IS translation
  rotation IS rotation

  children [
    # ============================================================
    # Drone navigation gate
    #
    # Fixed dimensions:
    #   width  = 3.0 m
    #   height = 2.0 m
    #   depth  = 0.8 m
    #
    # Coordinate:
    #   X = depth
    #   Y = width
    #   Z = height
    # ============================================================

    # Front top crossbar
    DEF FRONT_CROSSBAR Pose {
      translation 0 0 2.0
      rotation 1 0 0 -1.570796
      children [
        Shape {
          appearance DEF POST_APP PBRAppearance {
            baseColor IS frameColor
            metalness 0
            roughness 0.25
          }
          geometry Capsule {
            height 3.0
            radius IS postRadius
          }
        }
      ]
    }

    # Front left vertical post
    DEF FRONT_LEFT_POST Pose {
      translation 0 -1.5 1.0
      children [
        Shape {
          appearance USE POST_APP
          geometry Cylinder {
            bottom FALSE
            top FALSE
            height 2.0
            radius IS postRadius
          }
        }
      ]
    }

    # Front right vertical post
    DEF FRONT_RIGHT_POST Pose {
      translation 0 1.5 1.0
      children [
        Shape {
          appearance USE POST_APP
          geometry Cylinder {
            bottom FALSE
            top FALSE
            height 2.0
            radius IS postRadius
          }
        }
      ]
    }

    # Rear top crossbar
    DEF REAR_CROSSBAR Pose {
      translation 0.8 0 2.0
      rotation 1 0 0 -1.570796
      children [
        Shape {
          appearance USE POST_APP
          geometry Capsule {
            height 3.0
            radius 0.025
          }
        }
      ]
    }

    # Rear bottom crossbar
    DEF REAR_BOTTOM_BAR Pose {
      translation 0.8 0 0
      rotation 1 0 0 -1.570796
      children [
        Shape {
          appearance USE POST_APP
          geometry Capsule {
            height 3.0
            radius 0.025
          }
        }
      ]
    }

    # Rear left vertical post
    DEF REAR_LEFT_POST Pose {
      translation 0.8 -1.5 1.0
      children [
        Shape {
          appearance USE POST_APP
          geometry Cylinder {
            bottom FALSE
            top FALSE
            height 2.0
            radius 0.025
          }
        }
      ]
    }

    # Rear right vertical post
    DEF REAR_RIGHT_POST Pose {
      translation 0.8 1.5 1.0
      children [
        Shape {
          appearance USE POST_APP
          geometry Cylinder {
            bottom FALSE
            top FALSE
            height 2.0
            radius 0.025
          }
        }
      ]
    }

    # Top left depth connector
    DEF TOP_LEFT_DEPTH_BAR Pose {
      translation 0.4 -1.5 2.0
      rotation 0 1 0 1.570796
      children [
        Shape {
          appearance USE POST_APP
          geometry Cylinder {
            bottom FALSE
            top FALSE
            height 0.8
            radius 0.025
          }
        }
      ]
    }

    # Top right depth connector
    DEF TOP_RIGHT_DEPTH_BAR Pose {
      translation 0.4 1.5 2.0
      rotation 0 1 0 1.570796
      children [
        Shape {
          appearance USE POST_APP
          geometry Cylinder {
            bottom FALSE
            top FALSE
            height 0.8
            radius 0.025
          }
        }
      ]
    }

    # Bottom left depth connector
    DEF BOTTOM_LEFT_DEPTH_BAR Pose {
      translation 0.4 -1.5 0
      rotation 0 1 0 1.570796
      children [
        Shape {
          appearance USE POST_APP
          geometry Cylinder {
            bottom FALSE
            top FALSE
            height 0.8
            radius 0.025
          }
        }
      ]
    }

    # Bottom right depth connector
    DEF BOTTOM_RIGHT_DEPTH_BAR Pose {
      translation 0.4 1.5 0
      rotation 0 1 0 1.570796
      children [
        Shape {
          appearance USE POST_APP
          geometry Cylinder {
            bottom FALSE
            top FALSE
            height 0.8
            radius 0.025
          }
        }
      ]
    }
  ]

  name IS name
  model "drone navigation gate"

  boundingObject Group {
    children [
      USE FRONT_CROSSBAR
      USE FRONT_LEFT_POST
      USE FRONT_RIGHT_POST
      USE REAR_CROSSBAR
      USE REAR_BOTTOM_BAR
      USE REAR_LEFT_POST
      USE REAR_RIGHT_POST
      USE TOP_LEFT_DEPTH_BAR
      USE TOP_RIGHT_DEPTH_BAR
      USE BOTTOM_LEFT_DEPTH_BAR
      USE BOTTOM_RIGHT_DEPTH_BAR
    ]
  }

  locked TRUE
}
}